server.port=8080
spring.application.name=srelab-sandbox-service
logging.level.com.srelab=INFO

# AI Agent (LangChain4j + Google Gemini) configuration.
# API key is read from GEMINI_API_KEY env var by default; override the property
# below directly if you need a different source.
srelab.agent.gemini-api-key=${GEMINI_API_KEY:}
srelab.agent.model-name=${SRELAB_AGENT_MODEL:gemini-2.5-flash}
srelab.agent.max-turns=${SRELAB_AGENT_MAX_TURNS:15}
