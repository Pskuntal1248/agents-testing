spring.application.name=byoc-app
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/srelab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Fault toggle: when true, /api/facilities issues one query per row (N+1)
# instead of a single batch query. Flip via env var SRELAB_FAULT_N1_QUERY_MODE=true.
srelab.fault.n1-query-mode=${SRELAB_FAULT_N1_QUERY_MODE:false}
